<div class="contact-container">
  @if (!isClosed) {
  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
    @if (submitError) {
      <div class="alert alert-error">Error al enviar. Inténtalo más tarde.</div>
    }

    <div class="form-group">
      <label for="nombre">Tu Nombre</label>
      <input type="text" id="nombre" name="name" formControlName="nombre" autocomplete="name" placeholder="Tu nombre">
    </div>

    <div class="form-group">
      <label for="email">Correo Electrónico</label>
      <input type="email" id="email" name="email" formControlName="email" autocomplete="email" placeholder="tu@email.com">
    </div>

    <div class="form-group">
      <label for="telefono">Teléfono (Opcional)</label>
      <input type="tel" id="telefono" name="tel" formControlName="telefono" autocomplete="tel" placeholder="600 000 000">
    </div>

    <div class="form-group">
      <label for="mensaje">Comentarios (Opcional)</label>
      <textarea id="mensaje" formControlName="mensaje" rows="3"></textarea>
    </div>

    <div style="display:none;"><input type="text" formControlName="honeypot"></div>

    <button type="submit" class="btn-submit" [disabled]="isSubmitting || contactForm.get('nombre')?.invalid || contactForm.get('email')?.invalid">
      {{ isSubmitting ? 'Enviando...' : 'Solicitar Auditoría' }}
    </button>
  </form>
  } @else {
    <div class="thank-you-message">
      <h3>¡Mensaje recibido!</h3>
      <p>Nos pondremos en contacto pronto.</p>
    </div>
  }
</div>
